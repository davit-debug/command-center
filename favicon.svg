<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tipGlow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark pyramid body -->
  <polygon points="256,31 41,461 471,461" fill="#020710" fill-opacity="0.98"/>

  <!-- Subtle inner amber wash -->
  <polygon points="256,31 41,461 471,461" fill="#8C6410" fill-opacity="0.08"/>

  <!-- Glowing edges -->
  <!-- Left edge: Gold -->
  <line x1="256" y1="31" x2="41" y2="461" stroke="#DCA81E" stroke-width="8" filter="url(#glow)" opacity="0.5"/>
  <line x1="256" y1="31" x2="41" y2="461" stroke="#DCA81E" stroke-width="4"/>

  <!-- Right edge: Cyan -->
  <line x1="256" y1="31" x2="471" y2="461" stroke="#58E6FF" stroke-width="8" filter="url(#glow)" opacity="0.5"/>
  <line x1="256" y1="31" x2="471" y2="461" stroke="#58E6FF" stroke-width="4"/>

  <!-- Bottom edge: Deep purple -->
  <line x1="41" y1="461" x2="471" y2="461" stroke="#7C3AED" stroke-width="4" opacity="0.7"/>

  <!-- Gold summit glow -->
  <circle cx="256" cy="31" r="20" fill="#FFC832" opacity="0.6" filter="url(#tipGlow)"/>
  <circle cx="256" cy="31" r="9" fill="#FFC832"/>
</svg>
