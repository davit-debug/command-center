<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ctaFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tipGlow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <polygon points="256,31 41,461 471,461" fill="url(#ctaFill)"/>
  <line x1="256" y1="31" x2="41" y2="461" stroke="#DCA81E" stroke-width="8" filter="url(#glow)" opacity="0.5"/>
  <line x1="256" y1="31" x2="41" y2="461" stroke="#DCA81E" stroke-width="4"/>
  <line x1="256" y1="31" x2="471" y2="461" stroke="#FFC832" stroke-width="8" filter="url(#glow)" opacity="0.5"/>
  <line x1="256" y1="31" x2="471" y2="461" stroke="#FFC832" stroke-width="4"/>
  <line x1="41" y1="461" x2="471" y2="461" stroke="#A06E0A" stroke-width="3" opacity="0.7"/>
  <circle cx="256" cy="31" r="20" fill="#FFC832" opacity="0.6" filter="url(#tipGlow)"/>
  <circle cx="256" cy="31" r="9" fill="#FFC832"/>
</svg>
