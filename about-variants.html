<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ჩვენს შესახებ — 15 ვარიანტი | 10XSEO</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/firago@1.0.0/FiraGO.css" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          primary: { DEFAULT: '#8B5CF6', light: '#A78BFA', dark: '#7C3AED' },
          'ai-blue': '#3B82F6',
          accent: '#14B8A6',
          gold: '#F5A623',
          surface: { dark: '#020710', 'dark-alt': '#0a0e1a' },
        },
        fontFamily: {
          body: ['FiraGO', 'sans-serif'],
          heading: ['"Dachi the Lynx"', 'sans-serif'],
        }
      }
    }
  }
</script>
<style>
  @font-face {
    font-family: 'Dachi the Lynx';
    src: url('fonts/DachiTheLynx.otf') format('opentype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  body { font-family: 'FiraGO', sans-serif; margin: 0; background: #020710; color: #fff; overflow: hidden; height: 100vh; }

  /* Sidebar */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 280px; z-index: 50;
    background: rgba(2,7,16,0.97); backdrop-filter: blur(20px);
    border-right: 1px solid rgba(139,92,246,0.1);
    display: flex; flex-direction: column;
    transition: transform 0.3s ease;
  }
  .sidebar.collapsed { transform: translateX(-280px); }

  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid rgba(139,92,246,0.08);
  }

  .variant-list {
    flex: 1; overflow-y: auto; padding: 12px;
    scrollbar-width: thin; scrollbar-color: rgba(139,92,246,0.2) transparent;
  }
  .variant-list::-webkit-scrollbar { width: 4px; }
  .variant-list::-webkit-scrollbar-track { background: transparent; }
  .variant-list::-webkit-scrollbar-thumb { background: rgba(139,92,246,0.2); border-radius: 4px; }

  .variant-btn {
    width: 100%; text-align: left; padding: 10px 14px; border-radius: 12px;
    border: 1px solid transparent; cursor: pointer; background: transparent;
    transition: all 0.2s ease; display: flex; align-items: center; gap: 12px;
    color: rgba(255,255,255,0.5); font-size: 13px; font-family: 'FiraGO', sans-serif;
    margin-bottom: 4px;
  }
  .variant-btn:hover { background: rgba(139,92,246,0.06); color: rgba(255,255,255,0.8); }
  .variant-btn.active {
    background: linear-gradient(135deg, rgba(139,92,246,0.12), rgba(59,130,246,0.08));
    border-color: rgba(139,92,246,0.2); color: #fff;
    box-shadow: 0 0 20px rgba(139,92,246,0.08);
  }
  .variant-btn .num {
    width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3);
    transition: all 0.2s ease;
  }
  .variant-btn.active .num {
    background: linear-gradient(135deg, #8B5CF6, #3B82F6);
    color: #fff;
  }
  .variant-btn .info { flex: 1; min-width: 0; }
  .variant-btn .name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .variant-btn .style-tag {
    font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .variant-btn.active .style-tag { color: rgba(139,92,246,0.7); }

  /* Preview area */
  .preview-area {
    margin-left: 280px; height: 100vh; position: relative;
    transition: margin-left 0.3s ease;
  }
  .preview-area.expanded { margin-left: 0; }

  .preview-iframe {
    width: 100%; height: 100%; border: none; background: #020710;
  }

  /* Toggle button */
  .toggle-sidebar {
    position: fixed; top: 16px; z-index: 60;
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(2,7,16,0.9); backdrop-filter: blur(10px);
    border: 1px solid rgba(139,92,246,0.15);
    color: rgba(255,255,255,0.6); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s ease;
  }
  .toggle-sidebar:hover { color: #fff; border-color: rgba(139,92,246,0.3); }
  .toggle-sidebar.at-sidebar { left: 292px; }
  .toggle-sidebar.at-edge { left: 12px; }

  /* Group headers */
  .group-header {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    color: rgba(139,92,246,0.4); padding: 12px 14px 6px; margin-top: 4px;
  }

  /* Open in new tab link */
  .open-link {
    position: fixed; bottom: 16px; right: 16px; z-index: 60;
    padding: 8px 16px; border-radius: 10px;
    background: rgba(2,7,16,0.9); backdrop-filter: blur(10px);
    border: 1px solid rgba(139,92,246,0.15);
    color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 500;
    text-decoration: none; transition: all 0.2s ease;
    display: flex; align-items: center; gap: 6px;
    font-family: 'FiraGO', sans-serif;
  }
  .open-link:hover { color: #fff; border-color: rgba(139,92,246,0.3); }

  /* Current variant label */
  .current-label {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 55;
    padding: 6px 16px; border-radius: 100px;
    background: rgba(139,92,246,0.1); backdrop-filter: blur(10px);
    border: 1px solid rgba(139,92,246,0.15);
    font-size: 12px; color: rgba(255,255,255,0.7); font-weight: 500;
    pointer-events: none; transition: opacity 0.3s ease;
    font-family: 'FiraGO', sans-serif;
  }

  @media (max-width: 768px) {
    .sidebar { width: 260px; }
    .preview-area { margin-left: 0; }
    .sidebar { transform: translateX(-260px); }
    .sidebar.open { transform: translateX(0); }
    .toggle-sidebar.at-sidebar { left: 272px; }
  }
</style>
</head>
<body class="dark">

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="flex items-center gap-3 mb-3">
      <img src="images/logo.png" alt="10XSEO" class="h-7 w-auto" onerror="this.style.display='none'">
      <div>
        <div class="text-sm font-bold text-white">ჩვენს შესახებ</div>
        <div class="text-[10px] text-white/30">15 ვარიანტი — აირჩიე საუკეთესო</div>
      </div>
    </div>
  </div>

  <div class="variant-list" id="variantList">
    <div class="group-header">ორიგინალი (v1–v5)</div>

    <button class="variant-btn active" data-variant="1" onclick="switchVariant(1)">
      <div class="num">1</div>
      <div class="info"><div class="name">The Story</div><div class="style-tag">ნარატივი / სტორითელინგი</div></div>
    </button>
    <button class="variant-btn" data-variant="2" onclick="switchVariant(2)">
      <div class="num">2</div>
      <div class="info"><div class="name">Data-Driven</div><div class="style-tag">დეშბორდი / ტერმინალი</div></div>
    </button>
    <button class="variant-btn" data-variant="3" onclick="switchVariant(3)">
      <div class="num">3</div>
      <div class="info"><div class="name">Team First</div><div class="style-tag">გუნდი / 10xელები</div></div>
    </button>
    <button class="variant-btn" data-variant="4" onclick="switchVariant(4)">
      <div class="num">4</div>
      <div class="info"><div class="name">Mission Forward</div><div class="style-tag">მისია / პირამიდა</div></div>
    </button>
    <button class="variant-btn" data-variant="5" onclick="switchVariant(5)">
      <div class="num">5</div>
      <div class="info"><div class="name">Client Success</div><div class="style-tag">კლიენტის შედეგები</div></div>
    </button>

    <div class="group-header">ახალი (v6–v15)</div>

    <button class="variant-btn" data-variant="6" onclick="switchVariant(6)">
      <div class="num">6</div>
      <div class="info"><div class="name">Glassmorphism</div><div class="style-tag">მინის ეფექტი / ნაწილაკები</div></div>
    </button>
    <button class="variant-btn" data-variant="7" onclick="switchVariant(7)">
      <div class="num">7</div>
      <div class="info"><div class="name">Neon Grid</div><div class="style-tag">კიბერპანკი / ნეონი</div></div>
    </button>
    <button class="variant-btn" data-variant="8" onclick="switchVariant(8)">
      <div class="num">8</div>
      <div class="info"><div class="name">Magazine Editorial</div><div class="style-tag">ჟურნალი / სერიფი</div></div>
    </button>
    <button class="variant-btn" data-variant="9" onclick="switchVariant(9)">
      <div class="num">9</div>
      <div class="info"><div class="name">3D Depth</div><div class="style-tag">სიღრმე / პარალაქსი</div></div>
    </button>
    <button class="variant-btn" data-variant="10" onclick="switchVariant(10)">
      <div class="num">10</div>
      <div class="info"><div class="name">Minimal Zen</div><div class="style-tag">მინიმალისტური / scroll-snap</div></div>
    </button>
    <button class="variant-btn" data-variant="11" onclick="switchVariant(11)">
      <div class="num">11</div>
      <div class="info"><div class="name">Brutalist Bold</div><div class="style-tag">ბრუტალისტური / მასიური</div></div>
    </button>
    <button class="variant-btn" data-variant="12" onclick="switchVariant(12)">
      <div class="num">12</div>
      <div class="info"><div class="name">Gradient Waves</div><div class="style-tag">გრადიენტი / ტალღები</div></div>
    </button>
    <button class="variant-btn" data-variant="13" onclick="switchVariant(13)">
      <div class="num">13</div>
      <div class="info"><div class="name">Constellation</div><div class="style-tag">კოსმოსი / ვარსკვლავები</div></div>
    </button>
    <button class="variant-btn" data-variant="14" onclick="switchVariant(14)">
      <div class="num">14</div>
      <div class="info"><div class="name">Split Screen</div><div class="style-tag">ასიმეტრიული / სტორითელინგი</div></div>
    </button>
    <button class="variant-btn" data-variant="15" onclick="switchVariant(15)">
      <div class="num">15</div>
      <div class="info"><div class="name">Card Stack</div><div class="style-tag">აპლიკაცია / კარდები</div></div>
    </button>
  </div>
</aside>

<!-- Toggle Sidebar Button -->
<button class="toggle-sidebar at-sidebar" id="toggleBtn" onclick="toggleSidebar()">
  <svg id="toggleIcon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <path d="M10 3L5 8L10 13"/>
  </svg>
</button>

<!-- Preview Area -->
<div class="preview-area" id="previewArea">
  <iframe class="preview-iframe" id="previewFrame" src="about-v1.html"></iframe>
</div>

<!-- Current variant label -->
<div class="current-label" id="currentLabel">v1 — The Story</div>

<!-- Open in new tab -->
<a class="open-link" id="openLink" href="about-v1.html" target="_blank">
  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h10a1 1 0 001-1v-3"/>
    <path d="M10 2h4v4"/>
    <path d="M14 2L7 9"/>
  </svg>
  ახალ ტაბში გახსნა
</a>

<script>
const variants = {
  1:  { name: 'The Story', file: 'about-v1.html' },
  2:  { name: 'Data-Driven', file: 'about-v2.html' },
  3:  { name: 'Team First', file: 'about-v3.html' },
  4:  { name: 'Mission Forward', file: 'about-v4.html' },
  5:  { name: 'Client Success', file: 'about-v5.html' },
  6:  { name: 'Glassmorphism', file: 'about-v6.html' },
  7:  { name: 'Neon Grid', file: 'about-v7.html' },
  8:  { name: 'Magazine Editorial', file: 'about-v8.html' },
  9:  { name: '3D Depth', file: 'about-v9.html' },
  10: { name: 'Minimal Zen', file: 'about-v10.html' },
  11: { name: 'Brutalist Bold', file: 'about-v11.html' },
  12: { name: 'Gradient Waves', file: 'about-v12.html' },
  13: { name: 'Constellation', file: 'about-v13.html' },
  14: { name: 'Split Screen', file: 'about-v14.html' },
  15: { name: 'Card Stack', file: 'about-v15.html' },
};

let currentVariant = 1;
let sidebarOpen = true;

function switchVariant(num) {
  currentVariant = num;
  const v = variants[num];

  // Update iframe
  document.getElementById('previewFrame').src = v.file;

  // Update buttons
  document.querySelectorAll('.variant-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.variant) === num);
  });

  // Update label
  document.getElementById('currentLabel').textContent = `v${num} — ${v.name}`;

  // Update open link
  document.getElementById('openLink').href = v.file;

  // Scroll active button into view
  const activeBtn = document.querySelector(`.variant-btn[data-variant="${num}"]`);
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sidebar = document.getElementById('sidebar');
  const preview = document.getElementById('previewArea');
  const btn = document.getElementById('toggleBtn');
  const icon = document.getElementById('toggleIcon');

  if (sidebarOpen) {
    sidebar.classList.remove('collapsed');
    preview.classList.remove('expanded');
    btn.classList.remove('at-edge');
    btn.classList.add('at-sidebar');
    icon.innerHTML = '<path d="M10 3L5 8L10 13"/>';
  } else {
    sidebar.classList.add('collapsed');
    preview.classList.add('expanded');
    btn.classList.remove('at-sidebar');
    btn.classList.add('at-edge');
    icon.innerHTML = '<path d="M6 3L11 8L6 13"/>';
  }
}

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    const next = currentVariant < 15 ? currentVariant + 1 : 1;
    switchVariant(next);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    const prev = currentVariant > 1 ? currentVariant - 1 : 15;
    switchVariant(prev);
  } else if (e.key === 'Escape') {
    toggleSidebar();
  }
});
</script>
</body>
</html>
